apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-{{ .Values.rbac.clusterRoleName }}
rules:
  # Custom resources in group io.platform.fastboot
  - apiGroups: ["io.platform.fastboot"]
    resources: ["platforms","databases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Tekton resources
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines", "pipelineruns", "taskruns", "tasks"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete", "deletecollection"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns/status", "taskruns/status"]
    verbs: ["get", "patch", "update"]

  # Core resources
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [ "apps" ]
    resources: [ "statefulsets" ]
    verbs: [ "*" ]

  # CronJobs
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-{{ .Values.rbac.clusterRoleBindingName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-{{ .Values.rbac.clusterRoleName }}
  apiGroup: rbac.authorization.k8s.io