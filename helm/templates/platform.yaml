apiVersion: io.platform.fastboot/v1alpha1
kind: Platform
metadata:
  name: {{ .Values.platform.name }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ .Values.platform.name }}
  stage: {{ .Values.platform.stage }}
  version: {{ .Values.platform.version }}

  defaults:
    database:
      storage: {{ .Values.platform.defaults.database.storage }}
      storageClass: {{ .Values.platform.defaults.database.storageClass }}
      externalAccess: {{ .Values.platform.defaults.database.externalAccess }}

  services:
    databases:
    {{- range .Values.platformServices.databases }}
      - name: {{ .name }}
        type: {{ .type }}
        version: {{ .version | quote }}
        port: {{ .port }}
        secretName: {{ .secretName }}
        {{- if hasKey . "storage" }}
        storage: {{ .storage }}
        {{- else }}
        storage: {{ $.Values.platform.defaults.database.storage }}
        {{- end }}
        {{- if hasKey . "storageClass" }}
        storageClass: {{ .storageClass }}
        {{- else }}
        storageClass: {{ $.Values.platform.defaults.database.storageClass }}
        {{- end }}
        {{- if hasKey . "externalAccess" }}
        externalAccess: {{ .externalAccess }}
        {{- else }}
        externalAccess: {{ $.Values.platform.defaults.database.externalAccess }}
        {{- end }}
    {{- end }}